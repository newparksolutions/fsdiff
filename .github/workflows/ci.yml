name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} - ${{ matrix.compiler }} - ${{ matrix.simd }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu x64 GCC with SIMD
          - os: ubuntu-x64
            runner: ubuntu-latest
            compiler: gcc
            simd: with-simd
            cmake_flags: ""
            cc: gcc
            cxx: g++

          # Ubuntu x64 GCC without SIMD
          - os: ubuntu-x64
            runner: ubuntu-latest
            compiler: gcc
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"
            cc: gcc
            cxx: g++

          # Ubuntu x64 Clang with SIMD
          - os: ubuntu-x64
            runner: ubuntu-latest
            compiler: clang
            simd: with-simd
            cmake_flags: ""
            cc: clang
            cxx: clang++

          # Ubuntu x64 Clang without SIMD
          - os: ubuntu-x64
            runner: ubuntu-latest
            compiler: clang
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"
            cc: clang
            cxx: clang++

          # Ubuntu x64 GCC-10 with SIMD
          - os: ubuntu-x64
            runner: ubuntu-22.04
            compiler: gcc-10
            simd: with-simd
            cmake_flags: ""
            cc: gcc-10
            cxx: g++-10

          # Ubuntu x64 GCC-10 without SIMD
          - os: ubuntu-x64
            runner: ubuntu-22.04
            compiler: gcc-10
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"
            cc: gcc-10
            cxx: g++-10

          # Ubuntu x64 GCC-14 with SIMD
          - os: ubuntu-x64
            runner: ubuntu-24.04
            compiler: gcc-14
            simd: with-simd
            cmake_flags: ""
            cc: gcc-14
            cxx: g++-14

          # Ubuntu x64 GCC-14 without SIMD
          - os: ubuntu-x64
            runner: ubuntu-24.04
            compiler: gcc-14
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"
            cc: gcc-14
            cxx: g++-14

          # Ubuntu x64 Clang-15 with SIMD
          - os: ubuntu-x64
            runner: ubuntu-22.04
            compiler: clang-15
            simd: with-simd
            cmake_flags: ""
            cc: clang-15
            cxx: clang++-15

          # Ubuntu x64 Clang-15 without SIMD
          - os: ubuntu-x64
            runner: ubuntu-22.04
            compiler: clang-15
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"
            cc: clang-15
            cxx: clang++-15

          # ARM with SIMD
          - os: arm
            runner: ARM_Runner
            compiler: gcc
            simd: with-simd
            cmake_flags: ""
            cc: gcc
            cxx: g++

          # ARM without SIMD
          - os: arm
            runner: ARM_Runner
            compiler: gcc
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"
            cc: gcc
            cxx: g++

          # Windows x64 with SIMD
          - os: windows-x64
            runner: windows-latest
            compiler: msvc
            simd: with-simd
            cmake_flags: ""

          # Windows x64 without SIMD
          - os: windows-x64
            runner: windows-latest
            compiler: msvc
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools (Linux)
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "gcc-10" ]; then
            sudo apt-get install -y cmake gcc-10 g++-10
          elif [ "${{ matrix.compiler }}" = "gcc-14" ]; then
            sudo apt-get install -y cmake gcc-14 g++-14
          elif [ "${{ matrix.compiler }}" = "clang-15" ]; then
            sudo apt-get install -y cmake clang-15
          elif [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y build-essential cmake clang
          else
            sudo apt-get install -y build-essential cmake
          fi

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -S . ${{ matrix.cmake_flags }}

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure -C Release

      - name: Display build info
        shell: bash
        env:
          CC: ${{ matrix.cc }}
        run: |
          if [ "$RUNNER_OS" != "Windows" ]; then
            echo "Compiler: $($CC --version | head -1)"
          fi
          cd build
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./Release/fsdiff.exe --version || ./bin/Release/fsdiff.exe --version || echo "fsdiff binary not found"
          else
            ./bin/fsdiff --version
          fi
          echo "All tests completed successfully"
