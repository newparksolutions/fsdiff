name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} - ${{ matrix.simd }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu x64 with SIMD
          - os: ubuntu-x64
            runner: ubuntu-latest
            simd: with-simd
            cmake_flags: ""

          # Ubuntu x64 without SIMD
          - os: ubuntu-x64
            runner: ubuntu-latest
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"

          # ARM with SIMD
          - os: arm
            runner: ARM_Runner
            simd: with-simd
            cmake_flags: ""

          # ARM without SIMD
          - os: arm
            runner: ARM_Runner
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. ${{ matrix.cmake_flags }}

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Display SIMD backend
        run: |
          cd build
          ./bin/fsdiff --version
          if [ -f ./bin/test_roundtrip ]; then
            echo "Tests completed successfully"
          fi
