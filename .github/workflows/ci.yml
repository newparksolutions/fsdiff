name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} - ${{ matrix.simd }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu x64 with SIMD
          - os: ubuntu-x64
            runner: ubuntu-latest
            simd: with-simd
            cmake_flags: ""

          # Ubuntu x64 without SIMD
          - os: ubuntu-x64
            runner: ubuntu-latest
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"

          # ARM with SIMD
          - os: arm
            runner: ARM_Runner
            simd: with-simd
            cmake_flags: ""

          # ARM without SIMD
          - os: arm
            runner: ARM_Runner
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"

          # Windows x64 with SIMD
          - os: windows-x64
            runner: windows-latest
            simd: with-simd
            cmake_flags: ""

          # Windows x64 without SIMD
          - os: windows-x64
            runner: windows-latest
            simd: no-simd
            cmake_flags: "-DFSDIFF_ENABLE_SIMD=OFF"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools (Linux)
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        run: |
          cmake -B build -S . ${{ matrix.cmake_flags }}

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure -C Release

      - name: Display build info
        shell: bash
        run: |
          cd build
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./Release/fsdiff.exe --version || ./bin/Release/fsdiff.exe --version || echo "fsdiff binary not found"
          else
            ./bin/fsdiff --version
          fi
          echo "All tests completed successfully"
